apiVersion: v1
kind: Pod
metadata:
  name: servlet
spec:
  restartPolicy: Always
  containers:
    - name: servlet
      image: servlet:1.3.1
      environment:
        - JAVA_OPTS="-Dsun.security.ssl.allowUnsafeRenegotiation=true -Djetty.home=. -Xms256m -Xmx396m -server"
      ports:
        - containerPort: 8080
          hostPort: 8080
      resources:
        limits:
          memory: 512Mi
          cpu: 100m
      securityContext:
        noNewPrivileges: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-tmp
          mountPath: /var/tmp
      livenessProbe:
        exec:
          command: ["curl", "-f", "http://localhost:8080"]
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
    - name: var-tmp
      emptyDir:
        medium: Memory
---
apiVersion: v1
kind: Pod
metadata:
  name: servlet-dev
spec:
  restartPolicy: Always
  containers:
    - name: servlet-dev
      image: servlet:dev
      environment:
        - JAVA_OPTS="-Dsun.security.ssl.allowUnsafeRenegotiation=true -Djetty.home=. -Xms256m -Xmx396m"
      ports:
        - containerPort: 11080
          hostPort: 11080
      resources:
        limits:
          memory: 512Mi
          cpu: 100m
      securityContext:
        noNewPrivileges: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-tmp
          mountPath: /var/tmp
      livenessProbe:
        exec:
          command: ["curl", "-f", "http://localhost:10080"]
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
    - name: var-tmp
      emptyDir:
        medium: Memory
