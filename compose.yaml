services:
  servlet-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: servlet:dev
    container_name: servlet-dev
    ports:
      - "11080:11080"
    restart: unless-stopped

  servlet:
    build:
      context: .
      dockerfile: Dockerfile
    image: servlet:1.3.1
    container_name: servlet
    ports:
      - "8080:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/tmp
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
